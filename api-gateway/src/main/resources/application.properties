server.port=8080
spring.application.name=api-gateway

jwt.secret=${JWT_SECRET:SklPZUlNUGxhdGZvcm1EZXZTZWNyZXRLZXkyMDI2SEVS}

eim.services.user-url=http://localhost:8086
eim.services.inventory-url=http://localhost:8087
eim.services.psmo-url=http://localhost:8088

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# CORS origins allowed to call the gateway from a browser UI (comma-separated). Defaults to '*'
# for dev; set to the real UI origin(s) in production, e.g. http://20.235.221.251:5173
eim.gateway.cors.allowed-origins=${GATEWAY_CORS_ORIGINS:*}

# Public HTTPS connector (single TLS entry point for the UI). Off by default for local dev;
# enable on the public deployment. Port must not clash with psmo's ESipa TLS port (8443).
eim.gateway.tls.enabled=${GATEWAY_TLS_ENABLED:false}
eim.gateway.tls.port=${GATEWAY_TLS_PORT:9443}
eim.gateway.tls.keystore=${GATEWAY_TLS_KEYSTORE:./tls/eim2-tls.p12}
eim.gateway.tls.password=${GATEWAY_TLS_PASSWORD:changeit}
eim.gateway.tls.key-alias=${GATEWAY_TLS_KEY_ALIAS:eim2-tls}

management.endpoints.web.exposure.include=health,info
