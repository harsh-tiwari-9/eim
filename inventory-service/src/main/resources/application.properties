server.port=8087
spring.application.name=inventory-service

spring.datasource.url=jdbc:postgresql://localhost:5432/jio_eim
spring.datasource.username=eim
spring.datasource.password=eim_dev_password

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=inventory

spring.flyway.enabled=true
spring.flyway.schemas=inventory
spring.flyway.default-schema=inventory
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

management.endpoints.web.exposure.include=health,info
