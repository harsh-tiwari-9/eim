server.port=8087
spring.application.name=inventory-service

spring.datasource.url=jdbc:postgresql://localhost:5432/jio_eim
spring.datasource.username=eim
spring.datasource.password=eim_dev_password

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=inventory

spring.flyway.enabled=true
spring.flyway.schemas=inventory
spring.flyway.default-schema=inventory
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

eim.minio.endpoint=http://127.0.0.1:9002
eim.minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
eim.minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
eim.minio.bucket=eim-inventory

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=inventory-ingest-consumer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

eim.ingest.kafka.topic=inventory.ingest
eim.ingest.poller.fixed-delay-ms=5000

management.endpoints.web.exposure.include=health,info
