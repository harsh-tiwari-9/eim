server.port=8088
spring.application.name=psmo-engine

spring.datasource.url=jdbc:postgresql://localhost:5432/jio_eim
spring.datasource.username=eim
spring.datasource.password=eim_dev_password

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=psmo

spring.flyway.enabled=true
spring.flyway.schemas=psmo
spring.flyway.default-schema=psmo
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.group-id=psmo-engine
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

eim.psmo.kafka.commands-topic=psmo.commands
eim.psmo.kafka.results-topic=psmo.results

management.endpoints.web.exposure.include=health,info
spring.data.web.pageable.default-page-size: 10
spring.data.web.pageable.max-page-size: 1000