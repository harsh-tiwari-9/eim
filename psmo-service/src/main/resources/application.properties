server.port=8088
spring.application.name=psmo-engine

spring.datasource.url=jdbc:postgresql://localhost:5432/jio_eim
spring.datasource.username=eim
spring.datasource.password=eim_dev_password

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=psmo

spring.flyway.enabled=true
spring.flyway.schemas=psmo
spring.flyway.default-schema=psmo
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.group-id=psmo-engine
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

eim.psmo.kafka.commands-topic=psmo.commands
eim.psmo.kafka.results-topic=psmo.results

# eIM identity + eUICC-Package signing key (SGP.32 §2.11.1). The signing key is EC P-256; its public
# half MUST be provisioned on the card as eimPublicKeyData (via the vendor eim1 portal). Distinct
# from the TLS keypair. The 'lab' profile uses a NoOp signer instead.
eim.psmo.eim-id=${EIM_ID:id1}
eim.psmo.signing.keystore=${EIM_SIGNING_KEYSTORE:./tls/eim2-signing.p12}
eim.psmo.signing.password=${EIM_SIGNING_PASSWORD:changeit}
eim.psmo.signing.key-alias=${EIM_SIGNING_KEY_ALIAS:eim2-signing}
eim.psmo.signing.keystore-type=${EIM_SIGNING_KEYSTORE_TYPE:PKCS12}

management.endpoints.web.exposure.include=health,info

# Device-facing ESipa HTTPS connector (SGP.32 3.1.2.1). Disabled by default; enable for the
# public eim2 deployment so the eUICC's IPAe can open a TLS session. The cert MUST be an EC/ECDSA
# cert whose key/chain is provisioned as trustedPublicKeyDataTls in eim2's eIM Configuration Data.
eim.esipa.tls.enabled=${ESIPA_TLS_ENABLED:false}
eim.esipa.tls.port=${ESIPA_TLS_PORT:8443}
eim.esipa.tls.keystore=${ESIPA_TLS_KEYSTORE:./tls/eim2-tls.p12}
eim.esipa.tls.password=${ESIPA_TLS_PASSWORD:changeit}
eim.esipa.tls.key-alias=${ESIPA_TLS_KEY_ALIAS:eim2-tls}