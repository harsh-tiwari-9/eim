server.port=8086
spring.application.name=user-service

spring.datasource.url=jdbc:postgresql://localhost:5432/jio_eim
spring.datasource.username=eim
spring.datasource.password=eim_dev_password

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=users

spring.flyway.enabled=true
spring.flyway.schemas=users
spring.flyway.default-schema=users
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

jwt.secret=${JWT_SECRET:SklPZUlNUGxhdGZvcm1EZXZTZWNyZXRLZXkyMDI2SEVS}
jwt.expiry-hours=${JWT_EXPIRY_HOURS:8}

management.endpoints.web.exposure.include=health,info
